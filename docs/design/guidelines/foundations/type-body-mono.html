<!-- @dsCard group="Type" viewport="700x190" name="Body & Mono labels" subtitle="Hanken body · IBM Plex Mono apothecary labels" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: var(--bg-base); font-family: var(--font-sans); color: var(--text-primary); }
  .wrap { padding: 22px 24px; display: grid; grid-template-columns: 1.4fr 1fr; gap: 28px; }
  .body { font-size: 15px; line-height: 1.65; color: var(--text-primary); max-width: 38ch; }
  .sec { font-size: 13px; color: var(--text-secondary); margin-top: 8px; }
  .label { font-family: var(--font-mono); font-size: 11px; letter-spacing: .12em; text-transform: uppercase; color: var(--text-secondary); }
  .data { font-family: var(--font-mono); font-size: 22px; color: var(--text-primary); margin-top: 4px; }
  .stack { display: flex; flex-direction: column; gap: 14px; }
</style>
</head>
<body>
<div class="wrap">
  <div>
    <div class="body">Apply a pea-size amount of retinoid to dry skin, avoiding the eye area. Follow with a ceramide moisturizer.</div>
    <div class="sec">Secondary text — zinc 500, used for captions and metadata.</div>
  </div>
  <div class="stack">
    <div><div class="label">Period after opening</div><div class="data">14 days</div></div>
    <div><div class="label">Last applied</div><div class="data">21:40</div></div>
  </div>
</div>
</body>
</html>
