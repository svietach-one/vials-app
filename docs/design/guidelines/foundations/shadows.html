<!-- @dsCard group="Spacing" viewport="700x170" name="Elevation & shadows" subtitle="Soft, low, cool — borders do most of the work" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: var(--bg-base); font-family: var(--font-sans); }
  .wrap { padding: 28px 24px; display: flex; gap: 22px; }
  .cell { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .box { width: 110px; height: 64px; background: var(--surface-raised); border: var(--border-hair) solid var(--border-divider); border-radius: var(--radius-lg); }
  .n { font-family: var(--font-mono); font-size: 10px; color: var(--text-tertiary); }
</style>
</head>
<body>
<div class="wrap">
  <div class="cell"><div class="box" style="box-shadow:var(--shadow-xs)"></div><div class="n">xs</div></div>
  <div class="cell"><div class="box" style="box-shadow:var(--shadow-sm)"></div><div class="n">sm</div></div>
  <div class="cell"><div class="box" style="box-shadow:var(--shadow-md)"></div><div class="n">md</div></div>
  <div class="cell"><div class="box" style="box-shadow:var(--shadow-lg)"></div><div class="n">lg</div></div>
</div>
</body>
</html>
