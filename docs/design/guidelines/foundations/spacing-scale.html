<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing scale" subtitle="4px base grid" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: var(--bg-base); font-family: var(--font-sans); }
  .wrap { padding: 24px; display: flex; align-items: flex-end; gap: 16px; }
  .cell { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .bar { background: var(--cabernet); border-radius: 2px; width: 16px; }
  .n { font-family: var(--font-mono); font-size: 10px; color: var(--text-tertiary); }
</style>
</head>
<body>
<div class="wrap">
  <div class="cell"><div class="bar" style="height:4px"></div><div class="n">1·4</div></div>
  <div class="cell"><div class="bar" style="height:8px"></div><div class="n">2·8</div></div>
  <div class="cell"><div class="bar" style="height:12px"></div><div class="n">3·12</div></div>
  <div class="cell"><div class="bar" style="height:16px"></div><div class="n">4·16</div></div>
  <div class="cell"><div class="bar" style="height:20px"></div><div class="n">5·20</div></div>
  <div class="cell"><div class="bar" style="height:24px"></div><div class="n">6·24</div></div>
  <div class="cell"><div class="bar" style="height:32px"></div><div class="n">8·32</div></div>
  <div class="cell"><div class="bar" style="height:40px"></div><div class="n">10·40</div></div>
  <div class="cell"><div class="bar" style="height:48px"></div><div class="n">12·48</div></div>
  <div class="cell"><div class="bar" style="height:64px"></div><div class="n">16·64</div></div>
</div>
</body>
</html>
