<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; background: var(--bg-base); font-family: var(--font-sans); }
  .wrap { padding: 22px 24px; display: grid; grid-template-columns: 1fr 1fr; gap: 22px 28px; align-items: start; }
  .lbl { font-family: var(--font-mono); font-size: 10px; letter-spacing: .12em; text-transform: uppercase; color: var(--text-tertiary); display: block; margin-bottom: 10px; }
  .stack { display: flex; flex-direction: column; gap: 12px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { Input, Checkbox, Switch, SegmentedControl } = window.VialsDesignSystem_d5d96f;
const I = (n) => <i data-lucide={n} style={{ width: 16, height: 16 }} />;

function Demo() {
  const [name, setName] = React.useState("Retinoid");
  const [conc, setConc] = React.useState("0.5");
  const [a, setA] = React.useState(true);
  const [b, setB] = React.useState(false);
  const [sw, setSw] = React.useState(true);
  const [phase, setPhase] = React.useState("Evening");
  React.useEffect(() => { window.lucide && window.lucide.createIcons(); });
  return (
    <div className="wrap">
      <div>
        <span className="lbl">Input</span>
        <div className="stack">
          <Input label="Product name" value={name} onChange={setName} icon={I("flask-conical")} />
          <Input label="Concentration" value={conc} onChange={setConc} suffix="%" helper="Optional" />
        </div>
      </div>
      <div>
        <span className="lbl">Segmented control</span>
        <SegmentedControl options={["Morning", "Evening"]} value={phase} onChange={setPhase} />
        <div style={{ height: 18 }} />
        <span className="lbl">Switch</span>
        <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
          <Switch checked={sw} onChange={setSw} />
          <span style={{ fontSize: 14, color: "var(--text-secondary)" }}>Daily reminders</span>
        </div>
      </div>
      <div>
        <span className="lbl">Checkbox — Cabernet active trigger</span>
        <div className="stack">
          <Checkbox checked={a} onChange={setA} label="Apply retinoid" sublabel="Pea-size, avoid eyes" />
          <Checkbox checked={b} onChange={setB} label="Moisturizer" />
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
